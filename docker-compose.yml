version: '3.8'

services:
  db:
    image: mysql:latest
    container_name: mysql_vibecoding
    restart: always
    environment:
      # Menentukan password untuk user root
      MYSQL_ROOT_PASSWORD: password
      # Membuat database otomatis saat startup
      MYSQL_DATABASE: vibecoding
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
