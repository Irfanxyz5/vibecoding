version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_vibecoding
    restart: always
    environment:
      # Menentukan password untuk user root
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      # Membuat database otomatis saat startup
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
